<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>WebAR Industrial Overlay - PS4 Controller</title>
  <!-- Importando A-Frame e AR.js -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    // Script para transformar o modelo em silhueta verde (Wireframe )
    AFRAME.registerComponent('industrial-overlay', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const obj = this.el.getObject3D('mesh');
          obj.traverse((node) => {
            if (node.isMesh) {
              // Criando o material verde transparente estilo "FabStation"
              node.material = new THREE.MeshBasicMaterial({
                color: 0x00FF00,    // Verde fluorescente
                wireframe: true,    // Apenas as linhas (silhueta)
                transparent: true,  // Permite ver através
                opacity: 0.5,       // 50% de transparência
                side: THREE.DoubleSide // Garante que vemos os dois lados da malha
              });
            }
          });
        });
      }
    });
  </script>
</head>

<body style="margin: 0px; overflow: hidden;">
  <!-- Cena de Realidade Aumentada -->
  <!-- 'sourceType: webcam' ativa a câmera do celular -->
  <a-scene embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;">

    <!-- 1. Carregamento do Modelo 3D -->
    <a-assets>
      <!-- SUBSTITUA O LINK ABAIXO PELO SEU ARQUIVO .GLB -->
      <a-asset-item id="meu-modelo" src="./ps4.glb"></a-asset-item>
    </a-assets>

    <!-- 2. O Marcador (Âncora) -->
    <!-- Quando a câmera ler o marcador 'hiro', o modelo aparece -->
    <a-marker preset="hiro">

      <!-- 3. O Modelo com o componente de silhueta verde -->
      <!-- scale: ajuste conforme o tamanho real do seu controle -->
      <!-- position: ajuste para alinhar com o marcador físico -->
      <a-entity gltf-model="#meu-modelo" industrial-overlay scale="1 1 1" position="0 0 0" rotation="0 0 0">
      </a-entity>

    </a-marker>

    <!-- 4. Câmera do Sistema -->
    <a-entity camera></a-entity>

  </a-scene>
</body>

</html>
